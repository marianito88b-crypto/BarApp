<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BarApp - Gestión y Fidelización.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="barapp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BarApp</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps: se inyecta dinámicamente desde main.dart con la clave de EnvironmentConfig -->

  <!-- Configuración del motor Flutter antes del bootstrap (evita warnings de CDN) -->
  <script>
    window.flutterConfiguration = window.flutterConfiguration || {};
    Object.assign(window.flutterConfiguration, { renderer: "canvaskit" });
  </script>

  <!-- Loading screen mientras Flutter carga -->
  <style>
    body { margin: 0; background: #121212; overflow: hidden; }
    .loading-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .loading-container.fade-out { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #FFB300;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      margin-top: 16px; color: #888;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Splash de carga (Flutter lo remueve al arrancar) -->
  <div id="loading" class="loading-container">
    <div class="loading-spinner"></div>
    <div class="loading-text">Cargando BarApp...</div>
  </div>

  <script>
    // Remover splash cuando Flutter esté listo
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 300);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
